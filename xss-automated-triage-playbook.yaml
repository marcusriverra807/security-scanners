---
title: XSS Detection and Automated Triage Playbook

overview:
  This playbook is designed to automate the triage of alerts generated by the XSS detection rules defined in the sql-xss-configs.yaml file. It aims to verify alerts, reduce false positives, categorize severity, and recommend response actions accordingly.

steps:

  - id: alert_ingestion
    name: Alert Ingestion
    description: Receive XSS detection alerts from the security scanner.
    inputs:
      - alert_id
      - alert_rule_id
      - alert_pattern
      - alert_payload
      - alert_context
      - alert_severity
    actions:
      - Log alert details
      - Forward alert to triage engine

  - id: initial_validation
    name: Initial Validation
    description: Validate alert payload against the corresponding regex pattern to confirm detection.
    inputs:
      - alert_payload
      - alert_rule_id
    actions:
      - Retrieve regex pattern from sql-xss-configs.yaml by alert_rule_id
      - Apply regex pattern on alert_payload
      - If match:
          proceed to severity_assessment
        Else:
          mark alert as false positive and close

  - id: severity_assessment
    name: Severity Assessment
    description: Assess alert severity based on rule severity and context.
    inputs:
      - alert_severity
      - alert_context
    actions:
      - Map rule severity (high, medium, low) to triage priority (critical, moderate, low)
      - Check context for indicators of exploitability or impact
      - Adjust priority accordingly

  - id: enrichment
    name: Alert Enrichment
    description: Enrich alert with additional context.
    inputs:
      - alert_payload
      - alert_rule_id
    actions:
      - Extract source IP, URL, user agent from alert_context
      - Query threat intelligence feeds for known malicious IPs or domains
      - Retrieve historical alert correlation for similar patterns
      - Attach enrichment data to alert

  - id: decision
    name: Triage Decision
    description: Decide on automated response or escalation.
    inputs:
      - enriched_alert
      - triage_priority
    actions:
      - If triage_priority is critical:
          - Trigger immediate containment actions (e.g., block IP, isolate host)
          - Notify security operations team
        Else if moderate:
          - Create incident ticket for analyst review
          - Send alert notifications to SOC
        Else:
          - Log alert for monitoring
          - Schedule periodic review

  - id: response_execution
    name: Response Execution
    description: Execute automated or manual response actions.
    inputs:
      - decision
      - alert_details
    actions:
      - Execute containment steps if applicable
      - Initiate forensic data collection if needed
      - Document all actions taken

  - id: feedback_loop
    name: Feedback Loop
    description: Use analyst feedback to improve detection rules and triage accuracy.
    inputs:
      - analyst_decision
      - false_positive_marking
    actions:
      - Update detection rule false positive rates
      - Adjust regex patterns if necessary
      - Tune severity mappings
      - Retrain machine learning models if used

notes:
  - Runbook links from sql-xss-configs.yaml are referenced for detailed investigation and response steps for each rule.
  - Regularly update the detection rules and playbook based on emerging XSS attack patterns and intelligence.
  - Incorporate multi-factor verification for alerts before automated containment to minimize disruption.
