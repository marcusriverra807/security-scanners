# SQL XSS Detection Configuration

# Enhanced detection rules for Cross-Site Scripting (XSS)

rules:
  - id: xss-001
    description: "Detect script tag injection"
    pattern: "<script\s+[^>]*?(src=['\"]?[^'\"]*['\"]?[^>]*?|.*?</script>)|<[^>]*\s+(onload|onerror|onclick|onmouseover|onfocus|onblur)=['\"]?[^'\"]*['\"]?[^>]*?>"
    severity: "high"
  - id: xss-002
    description: "Detect JavaScript URLs"
    pattern: "javascript:[^\s]*|data:text/html[^\s]*|vbscript:[^\s]*"
    severity: "high"
  - id: xss-003
    description: "Detect onerror handler injection"
    pattern: "onerror=['\"]?[^'\"]*['\"]?|onclick=['\"]?[^'\"]*['\"]?|onload=['\"]?[^'\"]*['\"]?|onmouseover=['\"]?[^'\"]*['\"]?"
    severity: "high"
  - id: xss-004
    description: "Detect SVG onload injection"
    pattern: "<svg\s+[^>]*?(onload=['\"]?[^'\"]*['\"]?|onerror=['\"]?[^'\"]*['\"]?|onclick=['\"]?[^'\"]*['\"]?)"
    severity: "high"
  - id: xss-005
    description: "Detect iframe with JavaScript injection"
    pattern: "<iframe\s+[^>]*?(src=['\"]?javascript:[^'\"]*['\"]?|srcdoc=['\"]?[^'\"]*['\"]?|onload=['\"]?[^'\"]*['\"]?)"
    severity: "high"
  - id: xss-006
    description: "Detect body onload injection"
    pattern: "<body\s+[^>]*?(onload=['\"]?[^'\"]*['\"]?|onbeforeunload=['\"]?[^'\"]*['\"]?|onclick=['\"]?[^'\"]*['\"]?)"
    severity: "high"
  - id: xss-007
    description: "Detect image onerror injection"
    pattern: "<img\s+[^>]*?(onerror=['\"]?[^'\"]*['\"]?|onload=['\"]?[^'\"]*['\"]?|onclick=['\"]?[^'\"]*['\"]?)"
    severity: "high"
  - id: sql-001
    description: "Detect SQL injection patterns"
    pattern: "(\bSELECT\b|\bINSERT\b|\bUPDATE\b|\bDELETE\b|\bWHERE\b|\bOR\b|\bAND\b|\bUNION\b|--|/\*.*?\*/).*?(['\"]?[^;]*?['\"]?)"
    severity: "high"
  - id: sql-002
    description: "Detect tautology-based SQL injection"
    pattern: "(1=1|1=0|0=0|\bTRUE\b|\bFALSE\b|/\*.*?\*/)"
    severity: "high"
  - id: sensitive-001
    description: "Detect hardcoded API keys"
    pattern: "(?:API_KEY|SECRET|TOKEN|PASSWORD|KEY)=['\"]?([A-Za-z0-9]{32,})['\"]?|[A-Za-z0-9]{40}|\b[A-Za-z0-9]{24}\b"
    severity: "high"
  - id: sensitive-002
    description: "Detect hardcoded secrets"
    pattern: "(?:password|secret|token|api_key)\s*=\s*['\"]?([^'\"]*?)['\"]?|['\"]?([A-Za-z0-9]{40})['\"]?"
    severity: "high"