# SQL XSS Detection Configuration

# Enhanced detection rules for Cross-Site Scripting (XSS)

rules:
  - id: xss-001
    description: "Detect script tag injection with improved encoding recognition and whitelist"
    pattern: "<script\\b(?!.*\\btype\\s*=\\s*[\\'\\"]?module[\\'\\"]?)(?!%3Cscript%3E|%3cscript%3e)[^>]*>"
    severity: "high"
    whitelist_patterns:
      - encoded_script_safe_context
  - id: xss-002
    description: "Detect JavaScript URLs"
    pattern: "javascript:(?!base64)[^\\s]*|data:text/html[^\\s]*|vbscript:[^\\s]*"
    severity: "high"
  - id: xss-003
    description: "Detect onerror handler injection - tuned to exclude trusted domains"
    pattern: "(onerror|onclick|onload|onmouseover)=[\\'\\"]?[^\\'\\"]*[\\'\\"]?(?<!trusted-domain.com)(?<!example-trusted.com)"
    severity: "medium"
  - id: xss-004
    description: "Detect SVG onload injection with context filtering"
    pattern: "<svg\\s+[^>]*?(onload=[\\'\\"]?[^\\'\\"]*[\\'\\"]?|onerror=[\\'\\"]?[^\\'\\"]*[\\'\\"]?|onclick=[\\'\\"]?[^\\'\\"]*[\\'\\"]?)(?<!trusted-domain.com)(?<!example-trusted.com)"
    severity: "medium"
  - id: xss-005
    description: "Detect iframe with JavaScript injection"
    pattern: "<iframe\\s+[^>]*?(src=[\\'\\"]?javascript:[^\\'\\"]*[\\'\\"]?|srcdoc=[\\'\\"]?[^\\'\\"]*[\\'\\"]?|onload=[\\'\\"]?[^\\'\\"]*[\\'\\"]?)"
    severity: "high"
  - id: xss-006
    description: "Detect body onload injection - tuned to exclude trusted domains"
    pattern: "<body\\s+[^>]*?(onload=[\\'\\"]?[^\\'\\"]*[\\'\\"]?|onbeforeunload=[\\'\\"]?[^\\'\\"]*[\\'\\"]?|onclick=[\\'\\"]?[^\\'\\"]*[\\'\\"]?)(?<!trusted-domain.com)(?<!example-trusted.com)"
    severity: "medium"
  - id: xss-007
    description: "Detect image onerror injection with context filtering"
    pattern: "<img\\s+[^>]*?(onerror=[\\'\\"]?[^\\'\\"]*[\\'\\"]?|onload=[\\'\\"]?[^\\'\\"]*[\\'\\"]?|onclick=[\\'\\"]?[^\\'\\"]*[\\'\\"]?)(?<!trusted-domain.com)(?<!example-trusted.com)"
    severity: "medium"
  - id: new-xss-001
    description: "Detect URL encoding attacks"
    pattern: "(%3Cscript%3E|%3Ciframe%3E|%3Csvg%3E|%3Cimg%3E|%3Cbody%3E)"
    severity: "high"
  - id: new-xss-002
    description: "Detect DOM-based XSS"
    pattern: "(document\\.write|innerHTML|eval)\\s*\\("
    severity: "high"
  - id: new-xss-003
    description: "Detect usage of deprecated HTML attributes - refined regex to exclude safe attributes"
    pattern: "<(script|iframe|svg)[^>]*?(on\\w+=['\"?[^'\"]*['\"?])(?<!style|class|id)"
    severity: "medium"
  - id: new-xss-004
    description: "Detect script tag with attributes"
    pattern: "<script[^>]*\\s+(src|data|onerror|onclick)=[^>]*>"
    severity: "high"
  - id: new-xss-005
    description: "Detect dynamic script execution"
    pattern: "(eval|setTimeout|setInterval|execCommand|importScripts|document\\.write|innerHTML)\\s*\\("
    severity: "high"
  - id: new-xss-006
    description: "Detect inline event handlers - refined regex with whitelist for buttons, links, and inputs"
    pattern: "(?<!<a\\s+[^>]*?href=)(?<!<button\\s+)(?<!<input\\s+)[^<]*(on\\w+=['\"?[^'\"]*['\"?])"
    severity: "medium"
  - id: xss-reflected-001
    description: "Detect reflected XSS"
    pattern: "(?<=>)(.*?)(<script.*?>|javascript:|on\\w+=|data:text/html|eval\\()"
    severity: "high"

# SQL Injection Detection Rules

  - id: sql-001
    description: "Detect SQL injection patterns - added whitelist for parameterized queries"
    pattern: "(?<!\\w)(\\bSELECT\\b|\\bINSERT\\b|\\bUPDATE\\b|\\bDELETE\\b|\\bWHERE\\b|\\bOR\\b|\\bAND\\b|\\bUNION\\b|--|/\\*.*?\\*/)(?!.*\\bFROM\\b).*?(['\"]?[^;]*?['\"]?)(?<!\\w)(?<!parameterized)"
    severity: "high"
  - id: sql-002
    description: "Detect tautology-based SQL injection with context analysis - requires additional sanitation verification step in scanning logic"
    pattern: "(1=1|1=0|0=0|\\bTRUE\\b|\\bFALSE\\b|/\\*.*?\\*/)(?<!parameterized)"
    severity: "high"
    context_sanitation_verification: true
  - id: new-sql-001
    description: "Detect SQL injection via time-based attacks"
    pattern: "(SLEEP\\(|WAITFOR|BENCHMARK\\()"
    severity: "high"

# Sensitive Information Detection Rules

  - id: sensitive-001
    description: "Detect hardcoded API keys with verification step"
    pattern: "(?:API_KEY|SECRET|TOKEN|PASSWORD|KEY)=[\\'\\"]?([A-Za-z0-9]{32,})[\\'\\"]?(?=(\\s|$))"
    severity: "high"
  - id: sensitive-002
    description: "Detect hardcoded secrets with exclusions for safe tokens"
    pattern: "(?:password|secret|token|api_key)\\s*=\\s*[\\'\\"]?([^\\'\\"]*?)[\\'\\"]?|[\\'\\"]?([A-Za-z0-9]{40})[\\'\\"]?"
    severity: "high"