# SQL XSS Detection Configuration

# Enhanced detection rules for Cross-Site Scripting (XSS)

rules:
  - id: xss-001
    description: "Detect script tag injection"
    pattern: "<script\b[^>]*?(src=["'][^"']*["']|.*?</script>)"
    severity: "high"
    context: "Check for script tags without valid sources"
  - id: xss-002
    description: "Detect JavaScript URLs"
    pattern: "javascript:[^'\s]*|data:text/html[^'\s]*"
    severity: "high"
    context: "Avoid untrusted JavaScript URLs"
  - id: xss-003
    description: "Detect onerror handler injection"
    pattern: "(onerror|onclick|onload)\s*=\s*['"].*?['"]"
    severity: "medium"
    context: "Handle event attributes cautiously"
  - id: xss-004
    description: "Detect SVG onload injection"
    pattern: "<svg\b[^>]*?(onload=['"].*?['"]|onerror=['"].*?['"])"
    severity: "high"
    context: "Ensure SVG elements do not execute scripts"
  - id: xss-005
    description: "Detect iframe with JavaScript injection"
    pattern: "<iframe\b[^>]*?(src=["']javascript:[^"']*["']|srcdoc=["'][^"']*["'])"
    severity: "high"
    context: "Review iframe sources for security"
  - id: xss-006
    description: "Detect body onload injection"
    pattern: "<body\b[^>]*?(onload=['"].*?['"]|onbeforeunload=['"].*?['"])"
    severity: "medium"
    context: "Validate body event handlers"
  - id: xss-007
    description: "Detect image onerror injection"
    pattern: "<img\b[^>]*?(onerror=['"].*?['"]|onload=['"].*?['"])"
    severity: "medium"
    context: "Ensure images do not execute scripts"
  - id: sql-001
    description: "Detect SQL injection patterns"
    pattern: "(?i)\b(SELECT|INSERT|UPDATE|DELETE|WHERE|OR|AND|UNION)\b.*?('|\")?[^;]*?('|\")?"
    severity: "high"
    context: "Look for common SQL keywords"
  - id: sql-002
    description: "Detect tautology-based SQL injection"
    pattern: "(1=1|1=0|0=0)"
    severity: "high"
    context: "Identify tautological conditions"
  - id: sensitive-001
    description: "Detect hardcoded API keys"
    pattern: "(?<![A-Za-z0-9])[A-Za-z0-9]{32,}(?![A-Za-z0-9])"
    severity: "medium"
    context: "Check for long alphanumeric strings"
  - id: sensitive-002
    description: "Detect hardcoded secrets"
    pattern: "(?i)(password|secret|token|api_key)\s*=\s*['"][^'";]*['"]"
    severity: "high"
    context: "Identify common secret patterns"

# Regular review schedule: Every 3 months to ensure detection rules are up-to-date