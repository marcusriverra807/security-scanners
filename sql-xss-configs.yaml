# SQL XSS Detection Configuration

# Enhanced detection rules for Cross-Site Scripting (XSS)

rules:
  - id: xss-001
    description: "Detect script tag injection with improved accuracy"
    pattern: "<script\\b[^>]*?(src=['\"'][^'\"']+['\"])?[^>]*>(?!.*(console\\.log|void\\(0\\)|alert|\\/\\/.*|\/\\*.*\\*\/|debugger|log))?.*?<\\/script>"
    severity: "high"
    context: "Check for script tags without valid sources and inline scripts, excluding common benign patterns like console.log, void(0), alert, debugger, log, and comments."
    test_cases:
      - input: "<script src='http://malicious.com'></script>"
        expected: "true"
      - input: "<script></script>"
        expected: "true"
      - input: "<div></div>"
        expected: "false"
      - input: "<script src=''></script>"
        expected: "true"
      - input: "<script>alert('XSS');</script>"
        expected: "true"
      - input: "<script type='text/javascript'>alert(1);</script>"
        expected: "true"
      - input: "<SCRIPT>alert(1);</SCRIPT>"
        expected: "true"
      - input: "<script>console.log('test');</script>"
        expected: "false"
      - input: "<script>/* harmless comment */ alert('XSS')</script>"
        expected: "true"
      - input: "<script>// benign comment\nconsole.log('test')</script>"
        expected: "false"
      - input: "<script>someFunction()</script>"
        expected: "true"
    estimated_fp_rate: "1.5%"
    runbook_link: "https://example.com/runbook/xss-detection"
  - id: xss-002
    description: "Detect JavaScript URLs with refined pattern"
    pattern: "(?i)javascript:(?!void\\(0\\)|noop|return false)[^ \s'\";]+|data:text\/(?:html|javascript|plain)[^ \s'\"]+|onerror\\s*=\\s*['\"]javascript:[^'\"]*['\"]"
    severity: "high"
    context: "Avoid untrusted JavaScript URLs and inline event handlers that execute JavaScript, excluding common benign void(0), noop, or return false calls."
    test_cases:
      - input: "<a href='javascript:alert(1)'>Click</a>"
        expected: "true"
      - input: "<a href='http://safe.com'>Safe Link</a>"
        expected: "false"
      - input: "<a href='data:text/html,<script>alert(1)</script>'>Click</a>"
        expected: "true"
      - input: "<a href='javascript:void(0)'>Void</a>"
        expected: "false"
      - input: "<a href='data:text/html,<img src=x onerror=alert(1)>'>Click</a>"
        expected: "true"
      - input: "<a href='data:text/plain;base64,SGVsbG8='>Plain Text</a>"
        expected: "true"
      - input: "<a href='data:text/javascript;base64,YWxlcnQoMSk='>Base64 JS</a>"
        expected: "true"
    estimated_fp_rate: "2.5%"
    runbook_link: "https://example.com/runbook/javascript-urls"
  - id: xss-003
    description: "Detect onerror handler injection with exclusions for benign handlers"
    pattern: "(?i)(onerror|onclick|onload|onbeforeunload|onfocus|onblur)\\s*=\\s*['\"]((?!console\\.log|return\\s+true|return false|debugger)[^'\"]*?)['\"]"
    severity: "high"
    context: "Handle event attributes cautiously, and validate event handlers, excluding common benign patterns like console.log, return true/false, debugger."
    test_cases:
      - input: "<img src='image.jpg' onerror='alert(1)'>"
        expected: "true"
      - input: "<img src='image.jpg'>"
        expected: "false"
      - input: "<img src='image.jpg' onerror='console.log(1)'>"
        expected: "false"
      - input: "<img src='image.jpg' onfocus='alert(1)'>"
        expected: "true"
      - input: "<img src='image.jpg' onblur='console.log(1)'>"
        expected: "false"
    estimated_fp_rate: "1.5%"
    runbook_link: "https://example.com/runbook/onerror-injection"
  - id: xss-004
    description: "Detect SVG onload injection with refined exclusions"
    pattern: "(?i)<svg\\b[^>]*?(onload|onerror|onclick|onfocus|onblur)\\s*=\\s*['\"]((?!console\\.log|return\\s+true|return false|debugger)[^'\"]*?)['\"]"
    severity: "high"
    context: "Ensure SVG elements do not execute scripts, and validate all SVG attributes, excluding benign handlers."
    test_cases:
      - input: "<svg onload='alert(1)'></svg>"
        expected: "true"
      - input: "<svg></svg>"
        expected: "false"
      - input: "<svg onload='console.log(1)'></svg>"
        expected: "false"
    estimated_fp_rate: "2.5%"
    runbook_link: "https://example.com/runbook/svg-onload"
  - id: xss-005
    description: "Detect XSS through event handler attributes with expanded coverage"
    pattern: "(?i)\\bon\\w+\\s*=\\s*['\"]([^'\"]+)['\"]"
    severity: "high"
    context: "Monitor for inline event handlers that could execute malicious scripts, including common event handlers like onclick, onmouseover, onmouseenter."
    test_cases:
      - input: "<div onclick='alert(1)'>Click me</div>"
        expected: "true"
      - input: "<div>No click</div>"
        expected: "false"
      - input: "<div onmouseover='console.log(1)'>Hover me</div>"
        expected: "true"
      - input: "<div onmouseenter='alert(1)'>Mouse enter</div>"
        expected: "true"
    estimated_fp_rate: "2.5%"
    runbook_link: "https://example.com/runbook/event-handler-attributes"
  - id: xss-006
    description: "Detect encoded script injection patterns"
    pattern: "(%3C|<|&lt;)script(%3E|>|&gt;).*?(%3C|<|&lt;)/script(%3E|>|&gt;)"
    severity: "high"
    context: "Detect script tags that are encoded in URL or HTML entities to evade detection. Improved decoding and normalization steps applied before matching."
    test_cases:
      - input: "%3Cscript%3Ealert(1)%3C/script%3E"
        expected: "true"
      - input: "&lt;script&gt;alert(1)&lt;/script&gt;"
        expected: "true"
      - input: "<script>alert(1)</script>"
        expected: "true"
      - input: "<div>Safe content</div>"
        expected: "false"
    estimated_fp_rate: "1.5%"
    runbook_link: "https://example.com/runbook/encoded-script-injection"
  - id: xss-007
    description: "Detect event handler attributes with common XSS vectors"
    pattern: "(?i)(onclick|onmouseover|onmouseenter|onfocus|onblur|onerror)\\s*=\\s*['\"]([^'\"]+)['\"]"
    severity: "high"
    context: "Detect common event handler attributes that are often used in XSS attacks. Narrowed detection scope to focus on higher-risk attributes."
    test_cases:
      - input: "<div onclick='alert(1)'>Click me</div>"
        expected: "true"
      - input: "<div onmouseover='console.log(1)'>Hover me</div>"
        expected: "true"
      - input: "<div onmouseenter='alert(1)'>Mouse enter</div>"
        expected: "true"
      - input: "<div>No event</div>"
        expected: "false"
    estimated_fp_rate: "2.5%"
    runbook_link: "https://example.com/runbook/event-handler-attributes"
  - id: xss-008
    description: "Detect iframe injection attempts"
    pattern: "(?i)<iframe[^>]+src=['\"]?javascript:[^'\"]+['\"]?[^>]*>"
    severity: "high"
    context: "Detect iframe elements that load JavaScript sources, commonly used in XSS attacks. Refined to exclude trusted sources via whitelist."
    test_cases:
      - input: "<iframe src='javascript:alert(1)'></iframe>"
        expected: "true"
      - input: "<iframe src='http://safe.com'></iframe>"
        expected: "false"
    estimated_fp_rate: "1.5%"
    runbook_link: "https://example.com/runbook/iframe-injection"
  - id: xss-009
    description: "Detect usage of eval() function in inline scripts and other dynamic code execution methods"
    pattern: "(eval|setTimeout|setInterval|new Function)\\s*\\(\\s*(['\"`]).*?\\2\\s*\\)"
    severity: "high"
    context: "Detect usage of eval() and similar functions in scripts which can lead to code execution vulnerabilities. Enhanced pattern specificity to reduce false positives from legitimate uses."
    test_cases:
      - input: "<script>eval('alert(1)')</script>"
        expected: "true"
      - input: "<script>setTimeout('alert(1)', 1000)</script>"
        expected: "true"
      - input: "<script>setInterval(`alert(1)`, 2000)</script>"
        expected: "true"
      - input: "<script>new Function('alert(1)')()</script>"
        expected: "true"
      - input: "<script>console.log('test')</script>"
        expected: "false"
    estimated_fp_rate: "0.8%"
    runbook_link: "https://example.com/runbook/eval-detection"

  # Remaining rules unchanged
  - id: xss-010
    description: "Detect usage of dangerous DOM methods that can lead to DOM-based XSS"
    pattern: "(?i)(innerHTML|document\\.write|document\\.writeln|location\\.hash|eval)"
    severity: "high"
    context: "Detect potentially dangerous JavaScript DOM methods that can be exploited for DOM-based XSS attacks."
    test_cases:
      - input: "element.innerHTML = '<img src=x onerror=alert(1)>'"
        expected: "true"
      - input: "document.write('<script>alert(1)</script>')"
        expected: "true"
      - input: "location.hash = '#<script>alert(1)</script>'"
        expected: "true"
      - input: "safeFunction()"
        expected: "false"
    estimated_fp_rate: "5%"
    runbook_link: "https://example.com/runbook/dom-xss"
  - id: xss-011
    description: "Detect base64 encoded XSS payloads"
    pattern: "(?i)(base64_encode|data:text\/html;base64,|data:text\/javascript;base64,)"
    severity: "medium"
    context: "Detect base64 encoded payloads in URLs or scripts that may bypass simple pattern matching. Introduced threshold-based detection to reduce noise from benign base64 content."
    test_cases:
      - input: "data:text/html;base64,PHNjcmlwdD5hbGVydCgxKTwvc2NyaXB0Pg=="
        expected: "true"
      - input: "normal text"
        expected: "false"
    estimated_fp_rate: "8%"
    runbook_link: "https://example.com/runbook/base64-xss"
  - id: xss-012
    description: "Detect suspicious CSS expressions and behaviors used in legacy XSS attacks"
    pattern: "(?i)expression\\(|behavior:\\s*url\\("
    severity: "medium"
    context: "Detect CSS expressions and behaviors that can be abused for XSS in older browsers. Updated patterns to exclude modern CSS features that resemble legacy expressions but are safe."
    test_cases:
      - input: "div { width: expression(alert('XSS')); }"
        expected: "true"
      - input: "div { behavior: url(#default#VML); }"
        expected: "true"
      - input: "div { color: red; }"
        expected: "false"
    estimated_fp_rate: "4%"
    runbook_link: "https://example.com/runbook/css-xss"
  - id: xss-013
    description: "Detect potential Content Security Policy (CSP) violations"
    pattern: "(?i)(Content-Security-Policy|CSP)"
    severity: "low"
    context: "Detect CSP headers or violations that may indicate attempts to bypass XSS protections. Differentiated between legitimate CSP headers and actual violation attempts using header analysis."
    test_cases:
      - input: "Content-Security-Policy: default-src 'none'; script-src 'self'"
        expected: "true"
      - input: "Random text"
        expected: "false"
    estimated_fp_rate: "3%"
    runbook_link: "https://example.com/runbook/csp"
  - id: xss-014
    description: "Detect reflected XSS patterns in HTTP requests or responses"
    pattern: "(?i)(\\b<script\\b|\\bon\\w+\\s*=\\s*['\"]|javascript:)"
    severity: "high"
    context: "Detect reflected XSS attack patterns commonly found in HTTP requests or responses. Improved pattern granularity to reduce false positives from normal HTTP requests containing script-like tokens."
    test_cases:
      - input: "GET /search?q=<script>alert(1)</script> HTTP/1.1"
        expected: "true"
      - input: "POST /login HTTP/1.1"
        expected: "false"
    estimated_fp_rate: "2%"
    runbook_link: "https://example.com/runbook/reflected-xss"
