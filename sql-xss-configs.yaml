# SQL XSS Detection Configuration

# Enhanced detection rules for Cross-Site Scripting (XSS)

rules:
  - id: xss-001
    description: "Detect script tag injection"
    pattern: "<script\b[^>]*?src=['\"[^'\"]*['\"]?[^>]*?>|<script>.*?</script>"
    severity: "high"
    context: "Check for script tags without valid sources and inline scripts."
    test_cases:
      - input: "<script src='http://malicious.com'></script>"
        expected: "true"
      - input: "<script></script>"
        expected: "true"
      - input: "<div></div>"
        expected: "false"
    estimated_fp_rate: "5%"
    runbook_link: "https://example.com/runbook/xss-detection"
  - id: xss-002
    description: "Detect JavaScript URLs"
    pattern: "javascript:[^'\s]*|data:text/html[^'\s]*|onerror\s*=\s*['\"javascript:[^'\"]*['\"]"
    severity: "high"
    context: "Avoid untrusted JavaScript URLs and inline event handlers that execute JavaScript."
    test_cases:
      - input: "<a href='javascript:alert(1)'>Click</a>"
        expected: "true"
      - input: "<a href='http://safe.com'>Safe Link</a>"
        expected: "false"
    estimated_fp_rate: "7%"
    runbook_link: "https://example.com/runbook/javascript-urls"
  - id: xss-003
    description: "Detect onerror handler injection"
    pattern: "(onerror|onclick|onload|onbeforeunload)\s*=\s*['\"]([^'\"]*?)['\"]"
    severity: "high"
    context: "Handle event attributes cautiously, and validate event handlers."
    test_cases:
      - input: "<img src='image.jpg' onerror='alert(1)'>"
        expected: "true"
      - input: "<img src='image.jpg'>"
        expected: "false"
    estimated_fp_rate: "4%"
    runbook_link: "https://example.com/runbook/onerror-injection"
  - id: xss-004
    description: "Detect SVG onload injection"
    pattern: "<svg\b[^>]*?(onload|onerror|onclick)\s*=\s*['\"]([^'\"]*?)['\"]"
    severity: "high"
    context: "Ensure SVG elements do not execute scripts, and validate all SVG attributes."
    test_cases:
      - input: "<svg onload='alert(1)'></svg>"
        expected: "true"
      - input: "<svg></svg>"
        expected: "false"
    estimated_fp_rate: "6%"
    runbook_link: "https://example.com/runbook/svg-onload"
  - id: xss-005
    description: "Detect iframe with JavaScript injection"
    pattern: "<iframe\b[^>]*?(src=['\"]javascript:[^'\"]*['\"]|srcdoc=[''][^'\"]*[''])"
    severity: "high"
    context: "Review iframe sources for security, ensuring they are from trusted domains."
    test_cases:
      - input: "<iframe src='javascript:alert(1)'></iframe>"
        expected: "true"
      - input: "<iframe src='http://safe.com'></iframe>"
        expected: "false"
    estimated_fp_rate: "5%"
    runbook_link: "https://example.com/runbook/iframe-injection"
  - id: xss-006
    description: "Detect body onload injection"
    pattern: "<body\b[^>]*?(onload|onbeforeunload)\s*=\s*['\"]([^'\"]*?)['\"]"
    severity: "high"
    context: "Validate body event handlers and ensure they do not execute untrusted scripts."
    test_cases:
      - input: "<body onload='alert(1)'></body>"
        expected: "true"
      - input: "<body></body>"
        expected: "false"
    estimated_fp_rate: "3%"
    runbook_link: "https://example.com/runbook/body-onload"
  - id: xss-007
    description: "Detect image onerror injection"
    pattern: "<img\b[^>]*?(onerror|onload)\s*=\s*['\"]([^'\"]*?)['\"]"
    severity: "high"
    context: "Ensure images do not execute scripts, and validate all image attributes."
    test_cases:
      - input: "<img src='image.jpg' onerror='alert(1)'>"
        expected: "true"
      - input: "<img src='image.jpg'>"
        expected: "false"
    estimated_fp_rate: "4%"
    runbook_link: "https://example.com/runbook/image-onerror"
  - id: sql-001
    description: "Detect SQL injection patterns"
    pattern: "(?i)(?<!\w)\b(SELECT|INSERT|UPDATE|DELETE|WHERE|OR|AND|UNION|DROP|EXEC|ALTER|CREATE|MERGE)\b[^;]*?('|")?[^;]*?('|")?(?!\s*--|\s*/\*)"
    severity: "high"
    context: "Look for common SQL keywords and patterns indicative of SQL injection, not preceded or followed by comments or documentation."
    test_cases:
      - input: "SELECT * FROM users WHERE id='1' OR '1'='1'"
        expected: "true"
      - input: "SELECT * FROM users WHERE id='1'"
        expected: "false"
    estimated_fp_rate: "6%"
    runbook_link: "https://example.com/runbook/sql-injection"
  - id: sql-002
    description: "Detect tautology-based SQL injection"
    pattern: "(?i)(?<=\s)(1=1|1=0|0=0|true|false|OR\s+1=1|AND\s+1=1)(?=\s)"
    severity: "high"
    context: "Identify tautological conditions that may indicate SQL injection, focusing on user input fields."
    test_cases:
      - input: "1=1"
        expected: "true"
      - input: "0=0"
        expected: "true"
      - input: "1=2"
        expected: "false"
    estimated_fp_rate: "5%"
    runbook_link: "https://example.com/runbook/tautology-sql-injection"
  - id: sensitive-001
    description: "Detect hardcoded API keys"
    pattern: "(?<![A-Za-z0-9])[A-Za-z0-9]{32,}(?![A-Za-z0-9])"
    severity: "medium"
    context: "Check for long alphanumeric strings that may represent API keys, excluding known UUID formats."
    test_cases:
      - input: "12345678901234567890123456789012"
        expected: "true"
      - input: "not-a-key"
        expected: "false"
    estimated_fp_rate: "10%"
    runbook_link: "https://example.com/runbook/hardcoded-api-keys"
  - id: sensitive-002
    description: "Detect hardcoded secrets"
    pattern: "(?i)\b(password|secret|token|api_key|authorization)\s*=\s*['\"]([^'";]*)['\"]"
    severity: "high"
    context: "Identify common secret patterns and ensure sensitive data is not hardcoded, excluding safe configuration patterns."
    test_cases:
      - input: "password='mysecretpassword'"
        expected: "true"
      - input: "var username='user'"
        expected: "false"
    estimated_fp_rate: "8%"
    runbook_link: "https://example.com/runbook/hardcoded-secrets"
  - id: lateral-001
    description: "Detect lateral movement through PowerShell commands"
    pattern: "(Invoke-Expression|Invoke-Command|Start-Process|Set-ExecutionPolicy|New-PSSession|Enter-PSSession)\s+.*"
    severity: "high"
    context: "Monitor for PowerShell commands that indicate lateral movement within the network."
    test_cases:
      - input: "Invoke-Expression 'maliciousCommand'"
        expected: "true"
      - input: "Get-Process"
        expected: "false"
    estimated_fp_rate: "6%"
    runbook_link: "https://example.com/runbook/lateral-movement-detection"
  - id: xss-008
    description: "Detect script tag with async or defer attributes"
    pattern: "<script\b[^>]*?(src=['\"[^'\"]*['\"]?[^>]*?|async|defer)[^>]*?>|<script>.*?</script>"
    severity: "high"
    context: "Ensure script tags do not include async or defer attributes without validation."
    test_cases:
      - input: "<script async src='http://malicious.com'></script>"
        expected: "true"
      - input: "<script defer></script>"
        expected: "true"
      - input: "<div></div>"
        expected: "false"
    estimated_fp_rate: "5%"
    runbook_link: "https://example.com/runbook/script-async-defer"
  - id: xss-009
    description: "Detect untrusted inline event handlers"
    pattern: "on\w+\s*=\s*['\"]([^'\"]*?)['\"]"
    severity: "high"
    context: "Avoid inline event handlers to prevent execution of untrusted scripts."
    test_cases:
      - input: "<button onclick='alert(1)'>Click me</button>"
        expected: "true"
      - input: "<button>Safe Button</button>"
        expected: "false"
    estimated_fp_rate: "4%"
    runbook_link: "https://example.com/runbook/inline-event-handlers"
  - id: xss-010
    description: "Detect DOM-based XSS patterns"
    pattern: "(document\.write|innerHTML|outerHTML|eval)\s*\(""
    severity: "high"
    context: "Check for unsafe DOM manipulations that may introduce XSS vulnerabilities."
    test_cases:
      - input: "document.write('<img src=x onerror=alert(1)>');"
        expected: "true"
      - input: "var safeContent = '<p>Hello</p>';"
        expected: "false"
    estimated_fp_rate: "6%"
    runbook_link: "https://example.com/runbook/dom-xss"
  - id: sql-003
    description: "Detect SQL injection comment patterns"
    pattern: "(?i)\b(SELECT|INSERT|UPDATE|DELETE|WHERE|OR|AND|UNION|DROP|EXEC|ALTER|CREATE|MERGE)\b[^;]*?('|")?[^;]*?('|")?(\s*--.*|\s*/\*.*\*/)?$"
    severity: "high"
    context: "Identify SQL statements that include comments to bypass detection mechanisms."
    test_cases:
      - input: "SELECT * FROM users WHERE id='1' OR '1'='1' --"
        expected: "true"
      - input: "SELECT * FROM users WHERE id='1';"
        expected: "false"
    estimated_fp_rate: "5%"
    runbook_link: "https://example.com/runbook/sql-injection-comments"

# Regular review schedule: Every 3 months to ensure detection rules are up-to-date