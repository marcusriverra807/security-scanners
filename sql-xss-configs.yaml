# SQL XSS Detection Configuration

# Enhanced detection rules for Cross-Site Scripting (XSS)

rules:
  - id: xss-001
    description: "Detect script tag injection with improved accuracy"
    pattern: "<script\\b[^>]*?src=['\"[^\"]*['\"]?[^>]*?>|<script>((?!console\\.log|void\\(0\\)).)*?</script>"
    severity: "high"
    context: "Check for script tags without valid sources and inline scripts, excluding common benign patterns like console.log and void(0)."
    test_cases:
      - input: "<script src='http://malicious.com'></script>"
        expected: "true"
      - input: "<script></script>"
        expected: "true"
      - input: "<div></div>"
        expected: "false"
      - input: "<script src=''></script>"
        expected: "true"
      - input: "<script>alert('XSS');</script>"
        expected: "true"
      - input: "<script type='text/javascript'>alert(1);</script>"
        expected: "true"
      - input: "<SCRIPT>alert(1);</SCRIPT>"
        expected: "true"
      - input: "<script>console.log('test');</script>"
        expected: "false"
    estimated_fp_rate: "3%"
    runbook_link: "https://example.com/runbook/xss-detection"
  - id: xss-002
    description: "Detect JavaScript URLs with refined pattern"
    pattern: "javascript:(?!void\\(0\\))[^"]*|data:text/html[^"]*|onerror\\s*=\\s*['\"javascript:[^\'\"]*['\"]"
    severity: "high"
    context: "Avoid untrusted JavaScript URLs and inline event handlers that execute JavaScript, excluding common benign void(0) calls."
    test_cases:
      - input: "<a href='javascript:alert(1)'>Click</a>"
        expected: "true"
      - input: "<a href='http://safe.com'>Safe Link</a>"
        expected: "false"
      - input: "<a href='data:text/html,<script>alert(1)</script>'>Click</a>"
        expected: "true"
      - input: "<a href='javascript:void(0)'>Void</a>"
        expected: "false"
      - input: "<a href='data:text/html,<img src=x onerror=alert(1)>'>Click</a>"
        expected: "true"
    estimated_fp_rate: "5%"
    runbook_link: "https://example.com/runbook/javascript-urls"
  - id: xss-003
    description: "Detect onerror handler injection with exclusions for benign handlers"
    pattern: "(onerror|onclick|onload|onbeforeunload|onfocus|onblur)\\s*=\\s*['\"]((?!console\\.log|return\\s+true)[^'\"]*?)['\"]"
    severity: "high"
    context: "Handle event attributes cautiously, and validate event handlers, excluding common benign patterns like console.log and return true."
    test_cases:
      - input: "<img src='image.jpg' onerror='alert(1)'>"
        expected: "true"
      - input: "<img src='image.jpg'>"
        expected: "false"
      - input: "<img src='image.jpg' onerror='console.log(1)'>"
        expected: "false"
      - input: "<img src='image.jpg' onfocus='alert(1)'>"
        expected: "true"
      - input: "<img src='image.jpg' onblur='console.log(1)'>"
        expected: "false"
    estimated_fp_rate: "3%"
    runbook_link: "https://example.com/runbook/onerror-injection"
  - id: xss-004
    description: "Detect SVG onload injection with refined exclusions"
    pattern: "<svg\\b[^>]*?(onload|onerror|onclick|onfocus|onblur)\\s*=\\s*['\"]((?!console\\.log|return\\s+true)[^'\"]*?)['\"]"
    severity: "high"
    context: "Ensure SVG elements do not execute scripts, and validate all SVG attributes, excluding benign handlers."
    test_cases:
      - input: "<svg onload='alert(1)'></svg>"
        expected: "true"
      - input: "<svg></svg>"
        expected: "false"
      - input: "<svg onload='console.log(1)'></svg>"
        expected: "false"
    estimated_fp_rate: "4%"
    runbook_link: "https://example.com/runbook/svg-onload"
  - id: xss-005
    description: "Detect XSS through event handler attributes with expanded coverage"
    pattern: "\\bon\\w+\\s*=\\s*['\"]([^'\"]+)['\"]"
    severity: "high"
    context: "Monitor for inline event handlers that could execute malicious scripts, including common event handlers like onclick, onmouseover, onmouseenter."
    test_cases:
      - input: "<div onclick='alert(1)'>Click me</div>"
        expected: "true"
      - input: "<div>No click</div>"
        expected: "false"
      - input: "<div onmouseover='console.log(1)'>Hover me</div>"
        expected: "true"
      - input: "<div onmouseenter='alert(1)'>Mouse enter</div>"
        expected: "true"
  - id: xss-006
    description: "Detect encoded script injection patterns"
    pattern: "(%3C|<|&lt;)script(%3E|>|&gt;).*?(%3C|<|&lt;)/script(%3E|>|&gt;)"
    severity: "high"
    context: "Detect script tags that are encoded in URL or HTML entities to evade detection."
    test_cases:
      - input: "%3Cscript%3Ealert(1)%3C/script%3E"
        expected: "true"
      - input: "&lt;script&gt;alert(1)&lt;/script&gt;"
        expected: "true"
      - input: "<script>alert(1)</script>"
        expected: "true"
      - input: "<div>Safe content</div>"
        expected: "false"
    estimated_fp_rate: "3%"
    runbook_link: "https://example.com/runbook/encoded-script-injection"
  - id: xss-007
    description: "Detect event handler attributes with common XSS vectors"
    pattern: "(onclick|onmouseover|onmouseenter|onfocus|onblur|onerror)\\s*=\\s*['\"]([^'\"]+)['\"]"
    severity: "high"
    context: "Detect common event handler attributes that are often used in XSS attacks."
    test_cases:
      - input: "<div onclick='alert(1)'>Click me</div>"
        expected: "true"
      - input: "<div onmouseover='console.log(1)'>Hover me</div>"
        expected: "true"
      - input: "<div onmouseenter='alert(1)'>Mouse enter</div>"
        expected: "true"
      - input: "<div>No event</div>"
        expected: "false"
  - id: XSS001
    description: "Detects malicious script tags"
    pattern: "<script.*?>.*?</script>"
    severity: "high"
    context: "web"
    test_cases:
      - input: "test1"
      - input: "test2"
    estimated_fp_rate: "low"
    runbook_link: "http://example.com/runbook"