# SQL XSS Detection Configuration

# Enhanced detection rules for Cross-Site Scripting (XSS)

rules:
  - id: xss-001
    description: "Detect script tag injection"
    pattern: "<script\b[^>]*?src=['\"[^'\"]*['\"]?[^>]*?>|<script>.*?</script>"
    severity: "high"
    context: "Check for script tags without valid sources and inline scripts."
    test_cases:
      - input: "<script src='http://malicious.com'></script>"
        expected: "true"
      - input: "<script></script>"
        expected: "true"
      - input: "<div></div>"
        expected: "false"
    estimated_fp_rate: "5%"
    runbook_link: "https://example.com/runbook/xss-detection"
  - id: xss-002
    description: "Detect JavaScript URLs"
    pattern: "javascript:[^'\s]*|data:text/html[^'\s]*|onerror\s*=\s*['\"javascript:[^'\"]*['\"]"
    severity: "high"
    context: "Avoid untrusted JavaScript URLs and inline event handlers that execute JavaScript."
    test_cases:
      - input: "<a href='javascript:alert(1)'>Click</a>"
        expected: "true"
      - input: "<a href='http://safe.com'>Safe Link</a>"
        expected: "false"
    estimated_fp_rate: "7%"
    runbook_link: "https://example.com/runbook/javascript-urls"
  - id: xss-003
    description: "Detect onerror handler injection"
    pattern: "(onerror|onclick|onload|onbeforeunload)\s*=\s*['\"]([^'\"]*?)['\"]"
    severity: "high"
    context: "Handle event attributes cautiously, and validate event handlers."
    test_cases:
      - input: "<img src='image.jpg' onerror='alert(1)'>"
        expected: "true"
      - input: "<img src='image.jpg'>"
        expected: "false"
    estimated_fp_rate: "4%"
    runbook_link: "https://example.com/runbook/onerror-injection"
  - id: xss-004
    description: "Detect SVG onload injection"
    pattern: "<svg\b[^>]*?(onload|onerror|onclick)\s*=\s*['\"]([^'\"]*?)['\"]"
    severity: "high"
    context: "Ensure SVG elements do not execute scripts, and validate all SVG attributes."
    test_cases:
      - input: "<svg onload='alert(1)'></svg>"
        expected: "true"
      - input: "<svg></svg>"
        expected: "false"
    estimated_fp_rate: "6%"
    runbook_link: "https://example.com/runbook/svg-onload"
  - id: sql-004
    description: "Detect advanced SQL injection patterns"
    pattern: "(?i)(SELECT|INSERT|UPDATE|DELETE|WHERE|OR|AND|UNION|DROP|EXEC|ALTER|CREATE|MERGE)\s*\S*\s*[^;]*?(--|#|/\*)?"
    severity: "high"
    context: "Identify various SQL injection techniques that may exploit vulnerabilities."
    test_cases:
      - input: "SELECT * FROM users WHERE id='1' OR '1'='1' --"
        expected: "true"
      - input: "SELECT * FROM users;"
        expected: "false"
    estimated_fp_rate: "5%"
    runbook_link: "https://example.com/runbook/sql-injection-patterns"
  - id: sql-005
    description: "Detect SQL injection using time-based blind techniques"
    pattern: "(?i)(WAITFOR DELAY|SLEEP|BENCHMARK)\s*\(\s*['\"]?\d+\s*['\"]?\)"
    severity: "high"
    context: "Monitor for patterns indicative of time-based SQL injection attacks."
    test_cases:
      - input: "1; WAITFOR DELAY '00:00:05'"
        expected: "true"
      - input: "SELECT * FROM users;"
        expected: "false"
    estimated_fp_rate: "4%"
    runbook_link: "https://example.com/runbook/time-based-sql-injection"
  - id: sql-006
    description: "Detect SQL injection with UNION-based techniques"
    pattern: "(?i)UNION\s*SELECT"
    severity: "high"
    context: "Identify SQL injections that use UNION to combine results from multiple SELECT statements."
    test_cases:
      - input: "SELECT * FROM users UNION SELECT * FROM admin;"
        expected: "true"
      - input: "SELECT * FROM users;"
        expected: "false"
    estimated_fp_rate: "3%"
    runbook_link: "https://example.com/runbook/sql-union-injection"
  - id: sql-007
    description: "Detect SQL injection with comment-based techniques"
    pattern: "--\s*|#\s*"
    severity: "high"
    context: "Capture SQL injection attempts that use comments to manipulate queries."
    test_cases:
      - input: "SELECT * FROM users WHERE id=1; -- comment"
        expected: "true"
      - input: "SELECT * FROM users;"
        expected: "false"
    estimated_fp_rate: "2%"
    runbook_link: "https://example.com/runbook/sql-comment-injection"
  - id: sql-008
    description: "Detect SQL injection with nested queries"
    pattern: "(?i)(SELECT|FROM)\s*\((.*?)\)"
    severity: "high"
    context: "Identify SQL injections that use nested SELECT queries."
    test_cases:
      - input: "SELECT * FROM (SELECT * FROM users) AS subquery;"
        expected: "true"
      - input: "SELECT * FROM users;"
        expected: "false"
    estimated_fp_rate: "3%"
    runbook_link: "https://example.com/runbook/sql-nested-injection"
  - id: xss-005
    description: "Detect XSS through event handler attributes"
    pattern: "\bon\w+\s*=\s*['\"]([^'\"]+)['\"]"
    severity: "high"
    context: "Monitor for inline event handlers that could execute malicious scripts."
    test_cases:
      - input: "<div onclick='alert(1)'>Click me</div>"
        expected: "true"
      - input: "<div>No click</div>"
        expected: "false"
    estimated_fp_rate: "4%"
    runbook_link: "https://example.com/runbook/event-handler-injection"

